# Builds the Vite app and pushes ./dist to the gh-pages branch so GitHub Pages stays in sync with main.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Build embute VITE_* no bundle. Sem os 4 segredos abaixo, Web3Forms não envia em produção.
      # O workflow não define VITE_SUPABASE_* — em printbag.com.br o contato usa só Web3Forms (salvo alguém acrescente essas env aqui).
      - run: npm ci
      - run: npm run build
        env:
          VITE_WEB3FORMS_MARKETING: ${{ secrets.VITE_WEB3FORMS_MARKETING }}
          VITE_WEB3FORMS_RH: ${{ secrets.VITE_WEB3FORMS_RH }}
          VITE_WEB3FORMS_COMPRAS: ${{ secrets.VITE_WEB3FORMS_COMPRAS }}
          VITE_WEB3FORMS_SAC: ${{ secrets.VITE_WEB3FORMS_SAC }}

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
